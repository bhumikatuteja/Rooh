<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooh by SS</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- RAZORPAY SCRIPT -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        .fade-out { animation: fadeOut 0.5s ease-out forwards; }
        .toast-enter { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        @keyframes slideUp {
            0% { transform: translate(-50%, 20px); opacity: 0; }
            100% { transform: translate(-50%, 0); opacity: 1; }
        }
        @media (min-width: 768px) {
            @keyframes slideUp {
                0% { transform: translateY(20px); opacity: 0; }
                100% { transform: translateY(0); opacity: 1; }
            }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADfpBxUCFO9iXrsjfGEEycfCAzZiTfxVs",
            authDomain: "rooh-store.firebaseapp.com",
            projectId: "rooh-store",
            storageBucket: "rooh-store.firebasestorage.app",
            messagingSenderId: "491389749038",
            appId: "1:491389749038:web:8e27d42a2d2415ad5c9cbf"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const appId = 'rooh-store-production';
        window.FB = { db, collection, onSnapshot, query, orderBy, doc };
</script>
</head>
<body class="bg-[#FAF9F6] text-stone-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS MAPPING ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                // Safely render the icon inside the span so React doesn't conflict with Lucide
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: {
                            width: size,
                            height: size
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center align-middle"></span>;
        };

        // --- DATA ---
        const MAIN_CATEGORIES = ["Footwear", "Bags"];
        const AVAILABLE_COLORS = ["Gold", "Pink", "Green", "White", "Blue", "Orange", "Black", "Red"];

        const PRODUCTS = [
            { id: 1, name: "Rose Dust Zardosi", price: "2499", mainCategory: "Footwear", subCategory: "Bridal", color: "Pink", image: "https://images.unsplash.com/photo-1560769629-975ec94e6a86?auto=format&fit=crop&q=80&w=800", description: "Hand-embroidered velvet juttis featuring intricate zardosi work in antique gold.", pairedProductId: 5 },
            { id: 2, name: "Emerald Garden", price: "1899", mainCategory: "Footwear", subCategory: "Juttis", color: "Green", image: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?auto=format&fit=crop&q=80&w=800", description: "Vibrant green silk based juttis with multi-colored thread work inspired by Mughal gardens." },
            { id: 3, name: "Golden Hour Mules", price: "2100", mainCategory: "Footwear", subCategory: "Mules", color: "Gold", image: "https://images.unsplash.com/photo-1603145733190-d7812cc97e41?auto=format&fit=crop&q=80&w=800", description: "Contemporary mules with traditional beadwork. Slip into elegance with these versatile festive staples." },
            { id: 4, name: "Ivory Pearl", price: "2650", mainCategory: "Footwear", subCategory: "Bridal", color: "White", image: "https://images.unsplash.com/photo-1629813567776-9d3329f6323c?auto=format&fit=crop&q=80&w=800", description: "Pure silk base adorned with freshwater pearls and silver wire work. A classic choice for day weddings." },
            { id: 5, name: "Rose Dust Potli", price: "1499", mainCategory: "Bags", subCategory: "Potli", color: "Pink", image: "https://images.unsplash.com/photo-1584916201218-f4242ceb4809?auto=format&fit=crop&q=80&w=800", description: "A beautifully handcrafted matching velvet potli bag to complete your festive look.", pairedProductId: 1 },
            { id: 6, name: "Midnight Sparkle", price: "1899", mainCategory: "Bags", subCategory: "Clutch", color: "Black", image: "https://images.unsplash.com/photo-1566150905458-1bf1fc113f0d?auto=format&fit=crop&q=80&w=800", description: "An elegant black clutch with silver embroidery, perfect for evening wear." }
        ];

        // --- DYNAMIC STORE SETTINGS (Controlled by Admin Later) ---
        const STORE_SETTINGS = {
            bannerActive: false, // Set back to false to show the elegant default brand look
            bannerImage: "https://images.unsplash.com/photo-1603145733146-2d023192bd80?auto=format&fit=crop&q=80&w=2000",
            bannerTitle: "The Festive Edit",
            bannerSubtitle: "Flat 20% Off on Premium Styles",
            bannerCTA: "Shop the Sale"
        };

        const getColorHex = (name) => {
            const colors = { 'gold': '#D4AF37', 'pink': '#FFC0CB', 'green': '#2E8B57', 'white': '#FFFFFF', 'blue': '#000080', 'orange': '#FFA500', 'black': '#000000', 'red': '#8B0000' };
            return colors[name.toLowerCase()] || '#ccc';
        };

        // --- COMPONENTS ---

        const Navbar = ({ activePage, setActivePage, cartCount, wishlistCount }) => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { id: 'home', label: 'HOME' },
                { id: 'collection', label: 'COLLECTION' },
                { id: 'about', label: 'OUR STORY' }
            ];

            return (
                <React.Fragment>
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled || activePage !== 'home' ? 'bg-[#FAF9F6]/95 backdrop-blur-md shadow-sm py-3' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <button onClick={() => setMobileMenuOpen(true)} className="md:hidden text-stone-800 p-2 -ml-2">
                                <Icon name="menu" />
                            </button>

                            <div className="flex flex-col items-center cursor-pointer group" onClick={() => setActivePage('home')}>
                                <div className="text-center">
                                    <h1 className={`font-serif tracking-widest font-bold transition-all duration-300 ${scrolled || activePage !== 'home' ? 'text-2xl text-stone-800' : 'text-3xl text-stone-900'}`}>ROOH</h1>
                                    <span className="text-[10px] tracking-[0.3em] uppercase text-stone-500 block">By SS</span>
                                </div>
                            </div>

                            <div className="hidden md:flex space-x-8 items-center font-sans text-sm tracking-wide text-stone-700">
                                {navLinks.map((link) => (
                                    <button key={link.id} onClick={() => setActivePage(link.id)} className={`hover:text-[#C5A059] transition-colors uppercase ${activePage === link.id ? 'text-[#C5A059] font-medium' : ''}`}>
                                        {link.label}
                                    </button>
                                ))}
                                
                                <div className="w-px h-5 bg-stone-300"></div>

                                {/* Contact Icon */}
                                <a href="https://wa.me/919876543210" target="_blank" className="relative hover:text-[#25D366] transition-colors" title="Contact Us on WhatsApp">
                                    <Icon name="message-circle" size={20} />
                                </a>

                                {/* Wishlist Icon */}
                                <button onClick={() => setActivePage('wishlist')} className={`relative hover:text-red-500 transition-colors ${activePage === 'wishlist' ? 'text-red-500' : ''}`} title="Wishlist">
                                    <Icon name="heart" size={20} />
                                    {wishlistCount > 0 && (
                                        <span className="absolute -top-2 -right-2 bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">
                                            {wishlistCount}
                                        </span>
                                    )}
                                </button>

                                {/* Cart Icon */}
                                <button onClick={() => setActivePage('cart')} className={`relative hover:text-[#C5A059] transition-colors ${activePage === 'cart' ? 'text-[#C5A059]' : ''}`} title="Shopping Bag">
                                    <Icon name="shopping-bag" size={20} />
                                    {cartCount > 0 && (
                                        <span className="absolute -top-2 -right-2 bg-stone-900 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">
                                            {cartCount}
                                        </span>
                                    )}
                                </button>
                            </div>
                            
                            {/* Mobile Icons */}
                            <div className="flex items-center gap-3 md:hidden">
                                
                                <button onClick={() => setActivePage('wishlist')} className={`relative p-2 text-stone-800 hover:text-red-500 ${activePage === 'wishlist' ? 'text-red-500' : ''}`}>
                                    <Icon name="heart" size={22} />
                                    {wishlistCount > 0 && (
                                        <span className="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">
                                            {wishlistCount}
                                        </span>
                                    )}
                                </button>
                                <button onClick={() => setActivePage('cart')} className={`relative p-2 text-stone-800 hover:text-[#C5A059] ${activePage === 'cart' ? 'text-[#C5A059]' : ''}`}>
                                    <Icon name="shopping-bag" size={22} />
                                    {cartCount > 0 && (
                                        <span className="absolute top-0 right-0 bg-stone-900 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">
                                            {cartCount}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {mobileMenuOpen && (
                        <div className="fixed inset-0 z-50 flex fade-in">
                            <div className="fixed inset-0 bg-stone-900/50 backdrop-blur-sm" onClick={() => setMobileMenuOpen(false)}></div>
                            <div className="fixed top-0 left-0 h-full w-[80%] max-w-sm bg-[#FAF9F6] shadow-2xl flex flex-col z-50">
                                <div className="p-6 flex justify-between items-center border-b border-stone-200">
                                    <div className="flex flex-col">
                                        <h2 className="font-serif text-2xl font-bold text-stone-900">ROOH</h2>
                                        <span className="text-[10px] tracking-[0.2em] text-[#C5A059]">BY SS</span>
                                    </div>
                                    <button onClick={() => setMobileMenuOpen(false)} className="p-2"><Icon name="x" /></button>
                                </div>
                                <div className="flex flex-col p-6 space-y-6 font-serif text-2xl text-stone-800">
                                    {navLinks.map((link) => (
                                        <button key={link.id} onClick={() => { setActivePage(link.id); setMobileMenuOpen(false); }} className={`text-left ${activePage === link.id ? 'text-[#C5A059]' : ''}`}>
                                            {link.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </React.Fragment>
            );
        };

        const HomePage = ({ setActivePage, settings }) => {
            return (
                <div className="min-h-screen pt-0 fade-in">
                    <div className="relative h-screen w-full overflow-hidden flex items-center justify-center bg-[#F2F0E9]">
                        
                        {settings.bannerActive ? (
                            /* DYNAMIC SALE/FESTIVE BANNER */
                            <React.Fragment>
                                <div className="absolute inset-0 bg-black/40 z-10"></div>
                                <img src={settings.bannerImage} className="absolute inset-0 w-full h-full object-cover" alt="Festive Banner" />
                                
                                <div className="relative z-20 text-center px-4 max-w-4xl mt-16 text-white">
                                    <p className="font-sans tracking-[0.4em] text-xs md:text-sm uppercase mb-4 text-stone-200 drop-shadow-md">
                                        {settings.bannerSubtitle}
                                    </p>
                                    <h1 className="font-serif text-5xl md:text-8xl mb-8 leading-tight drop-shadow-lg">
                                        {settings.bannerTitle}
                                    </h1>
                                    <button onClick={() => setActivePage('collection')} className="inline-flex items-center gap-2 px-8 py-4 rounded-full bg-white text-stone-900 font-bold hover:bg-[#C5A059] hover:text-white transition-all shadow-xl">
                                        {settings.bannerCTA} <Icon name="arrow-right" size={18} />
                                    </button>
                                </div>
                            </React.Fragment>
                        ) : (
                            /* DEFAULT BRAND BANNER */
                            <React.Fragment>
                                <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-[#E8E1D5] rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
                                <div className="absolute -bottom-32 -left-32 w-[600px] h-[600px] bg-[#DCD3C1] rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>

                                <div className="relative z-20 text-center px-4 max-w-4xl mt-16 text-stone-800">
                                    <p className="font-sans tracking-[0.4em] text-xs md:text-sm uppercase mb-4 text-stone-500">Handcrafted Ethnic Footwear</p>
                                    <h1 className="font-serif text-5xl md:text-8xl mb-6 leading-tight">Walk the <span className="italic text-[#C5A059]">Elegance</span></h1>
                                    <button onClick={() => setActivePage('collection')} className="inline-flex items-center gap-2 px-8 py-3 rounded-full border border-stone-800 text-stone-800 hover:bg-stone-800 hover:text-[#FAF9F6] transition-all">
                                        Explore Collection <Icon name="arrow-right" size={18} />
                                    </button>
                                </div>
                            </React.Fragment>
                        )}
                    </div>

                    {/* BRAND ESSENCE SECTION */}
                    <section className="py-24 px-6 max-w-4xl mx-auto text-center fade-in">
                        <span className="text-[#C5A059] uppercase tracking-[0.3em] text-[10px] font-bold block mb-4">The Rooh Philosophy</span>
                        <h2 className="font-serif text-3xl md:text-5xl text-stone-900 mb-8 mt-2">Where Heritage Meets Comfort</h2>
                        <div className="w-12 h-px bg-[#C5A059] mx-auto mb-10"></div>
                        <p className="text-stone-600 font-light text-xl md:text-3xl leading-relaxed mb-10 max-w-3xl mx-auto italic">
                            "Footwear shouldn't ask you to choose between beauty and ease. It should be a seamless extension of your grace."
                        </p>
                        <p className="text-stone-500 font-light text-base md:text-lg leading-relaxed max-w-2xl mx-auto">
                            Every pair of Rooh is meticulously hand-embroidered by master artisans and engineered with double-cushioned soles. We preserve centuries-old Indian craftsmanship while giving you the freedom to walk effortlessly through your day.
                        </p>
                    </section>
                </div>
            );
        };

const CollectionPage = ({ products, subCategories, onProductClick, wishlist, toggleWishlist }) => {
    const [selectedMainCategory, setSelectedMainCategory] = useState("All");
    const [selectedSubCategory, setSelectedSubCategory] = useState("All");
    const [selectedColor, setSelectedColor] = useState(null);

            const availableSubCategories = ["All", ...subCategories];
           
            const handleMainCategoryChange = (mainCat) => {
                setSelectedMainCategory(mainCat);
                setSelectedSubCategory("All"); // Reset subcategory when main category changes
            };

const filteredProducts = products
        .filter(p => selectedMainCategory === "All" || p.mainCategory === selectedMainCategory)
        .filter(p => selectedSubCategory === "All" || p.subCategory === selectedSubCategory)
        .filter(p => selectedColor === null || p.color === selectedColor);

            return (
                <div className="min-h-screen pt-32 px-6 max-w-7xl mx-auto pb-24 fade-in">
                    <div className="text-center mb-8">
                        <h2 className="font-serif text-4xl text-stone-900 mb-4">Our Collection</h2>
                        <div className="w-16 h-1 bg-[#C5A059] mx-auto rounded-full mb-8"></div>
                        
                        {/* Main Category Tabs */}
                        <div className="flex justify-center gap-8 mb-8 border-b border-stone-200">
                            {["All", ...MAIN_CATEGORIES].map(cat => (
                                <button 
                                    key={cat} 
                                    onClick={() => handleMainCategoryChange(cat)}
                                    className={`pb-4 text-lg md:text-xl font-serif tracking-widest transition-all ${selectedMainCategory === cat ? 'text-stone-900 border-b-2 border-stone-900' : 'text-stone-400 hover:text-stone-600'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>

                        {/* Sub Category Pills */}
                        <div className="flex overflow-x-auto pb-4 md:justify-center gap-3 no-scrollbar px-2 mb-6">
                            {availableSubCategories.map(cat => (
                                <button key={cat} onClick={() => setSelectedSubCategory(cat)} className={`whitespace-nowrap px-6 py-2 rounded-full border text-sm transition-all ${selectedSubCategory === cat ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-600 border-stone-200'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>

                        <div className="flex justify-center mb-8">
                            <div className="flex items-center gap-3 overflow-x-auto p-2 bg-white rounded-full border border-stone-100 shadow-sm">
                                <button onClick={() => setSelectedColor(null)} className={`w-6 h-6 rounded-full flex items-center justify-center border ${selectedColor === null ? 'bg-stone-800 text-white' : 'text-stone-400'}`}>All</button>
                                {AVAILABLE_COLORS.map(color => (
                                    <button key={color} onClick={() => setSelectedColor(color === selectedColor ? null : color)} className={`w-6 h-6 rounded-full border ${selectedColor === color ? 'ring-2 ring-stone-800' : ''}`} style={{ backgroundColor: getColorHex(color) }} title={color}></button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                        {filteredProducts.map(product => {
                            const isWishlisted = wishlist.some(w => w.id === product.id);
                            
                            return (
                                <div key={product.id} onClick={() => onProductClick(product)} className="group bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all cursor-pointer border border-stone-100 relative">
                                    {/* Quick Wishlist Button */}
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); toggleWishlist(product); }}
                                        className={`absolute top-3 right-3 z-10 p-2 rounded-full shadow-sm transition-all ${isWishlisted ? 'bg-red-50 text-red-500' : 'bg-white/90 text-stone-400 hover:text-red-500'}`}
                                    >
                                        <Icon name="heart" size={16} className={isWishlisted ? "fill-current" : ""} />
                                    </button>

                                    <div className="relative aspect-[4/5] overflow-hidden">
                                        <img src={product.image} alt={product.name} className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700" />
                                        <div className="absolute top-3 left-3">
                                            <span className="w-4 h-4 rounded-full border border-white shadow-sm block" style={{ backgroundColor: getColorHex(product.color) }}></span>
                                        </div>
                                    </div>
                                    <div className="p-4">
                                        <p className="text-[10px] text-[#C5A059] uppercase tracking-widest font-bold mb-1">{product.subCategory}</p>
                                        <div className="flex justify-between items-start">
                                            <h3 className="font-serif text-lg text-stone-900">{product.name}</h3>
                                            <span className="font-sans font-medium text-sm">₹{product.price}</span>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const ProductDetailsPage = ({ product, onBack, onAddToCart, wishlist, toggleWishlist, onProductClick }) => {
            if (!product) return null;
            const isWishlisted = wishlist.some(w => w.id === product.id);

            // Find Paired Product (Simulating "Complete the Look" feature)
            const pairedProduct = product.pairedProductId ? PRODUCTS.find(p => p.id === product.pairedProductId) : null;

            return (
                <div className="min-h-screen pt-28 px-4 md:px-8 max-w-7xl mx-auto pb-12 fade-in">
                    <button onClick={onBack} className="inline-flex items-center text-stone-500 hover:text-stone-900 mb-6 transition-colors">
                        <Icon name="arrow-left" size={20} className="mr-2" /> Back
                    </button>
                    <div className="bg-white rounded-2xl overflow-hidden shadow-xl border border-stone-100 flex flex-col md:flex-row relative">
                        
                        <div className="w-full md:w-1/2 aspect-[4/5] relative">
                            <img src={product.image} alt={product.name} className="absolute inset-0 w-full h-full object-cover" />
                        </div>

                        <div className="w-full md:w-1/2 p-6 md:p-12 flex flex-col justify-center bg-[#FAF9F6]">
                            <span className="inline-block px-3 py-1 bg-stone-200 text-xs rounded-full uppercase tracking-wider w-fit mb-4">{product.mainCategory} • {product.subCategory}</span>
                            <h1 className="font-serif text-3xl md:text-5xl text-stone-900 mb-2">{product.name}</h1>
                            <p className="text-2xl text-[#C5A059] font-serif mb-8">₹ {product.price}</p>
                            <p className="text-stone-600 font-light leading-relaxed text-lg mb-8">{product.description}</p>
                            
                            <div className="flex gap-4">
                                <button onClick={() => onAddToCart(product)} className="flex-grow bg-stone-900 hover:bg-[#C5A059] text-white py-4 rounded-xl flex justify-center items-center gap-2 transition-colors duration-300">
                                    <Icon name="shopping-bag" /> Add to Bag
                                </button>
                                <button 
                                    onClick={() => toggleWishlist(product)} 
                                    className={`w-14 flex items-center justify-center rounded-xl border transition-all ${isWishlisted ? 'bg-red-50 border-red-200 text-red-500' : 'bg-white border-stone-200 text-stone-400 hover:text-red-500'}`}
                                >
                                    <Icon name="heart" size={22} className={isWishlisted ? "fill-current" : ""} />
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* COMPLETE THE LOOK / RECOMMENDATION SECTION */}
                    {pairedProduct && (
                        <div className="mt-12 md:mt-16 pt-8 border-t border-stone-200 fade-in">
                            <h3 className="font-serif text-2xl text-stone-900 mb-6 text-center">Complete the Look</h3>
                            <div 
                                onClick={() => { window.scrollTo(0,0); onProductClick(pairedProduct); }}
                                className="group max-w-md mx-auto bg-white rounded-xl overflow-hidden shadow-md hover:shadow-xl transition-all cursor-pointer border border-stone-100 flex items-center p-3"
                            >
                                <div className="w-24 h-24 flex-shrink-0 relative rounded-lg overflow-hidden bg-stone-100">
                                    <img src={pairedProduct.image} alt={pairedProduct.name} className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700" />
                                </div>
                                <div className="p-4 flex-grow">
                                    <p className="text-[10px] text-[#C5A059] uppercase tracking-widest font-bold mb-1">{pairedProduct.subCategory}</p>
                                    <h4 className="font-serif text-lg text-stone-900 leading-tight mb-1">{pairedProduct.name}</h4>
                                    <span className="font-sans font-medium text-sm text-stone-600">₹{pairedProduct.price}</span>
                                </div>
                                <div className="px-4 text-stone-300 group-hover:text-[#C5A059] transition-colors">
                                    <Icon name="arrow-right" size={20} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CartPage = ({ cart, setCart, onBack, setActivePage, showToast }) => {
            const total = cart.reduce((sum, item) => sum + (Number(item.price) * item.qty), 0);

            const handleCheckout = () => {
                if(total === 0) return;

                const options = {
                    key: "YOUR_RAZORPAY_KEY_ID", 
                    amount: total * 100, 
                    currency: "INR",
                    name: "Rooh by SS",
                    description: "Footwear Purchase",
                    handler: function(response) {
                        showToast(`Payment Successful! ID: ${response.razorpay_payment_id}`);
                        setCart([]); 
                        setActivePage('home'); 
                    },
                    prefill: {
                        name: "Customer Name",
                        email: "customer@example.com",
                        contact: "9999999999"
                    },
                    theme: { color: "#C5A059" }
                };
                
                const rzp = new window.Razorpay(options);
                rzp.open();
            };

            const removeFromCart = (productId) => {
                setCart(cart.filter(item => item.id !== productId));
            };

            return (
                <div className="min-h-screen pt-32 px-6 max-w-3xl mx-auto pb-24 fade-in">
                    <button onClick={onBack} className="inline-flex items-center text-stone-500 hover:text-stone-900 mb-6">
                        <Icon name="arrow-left" size={20} className="mr-2" /> Continue Shopping
                    </button>
                    
                    <h2 className="font-serif text-4xl mb-8 text-stone-900 text-center border-b border-stone-200 pb-6">Your Bag</h2>
                    
                    {cart.length === 0 ? (
                        <div className="text-center py-12">
                            <Icon name="shopping-bag" size={48} className="mx-auto text-stone-300 mb-4" />
                            <p className="text-stone-500 text-lg">Your bag is completely empty.</p>
                            <button onClick={onBack} className="mt-6 text-[#C5A059] underline">Start Shopping</button>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            {cart.map(item => (
                                <div key={item.id} className="flex gap-4 items-center bg-white p-4 rounded-xl border border-stone-100 shadow-sm">
                                    <img src={item.image} className="w-24 h-24 object-cover rounded-lg border border-stone-100" />
                                    <div className="flex-grow">
                                        <h3 className="font-serif text-lg text-stone-900">{item.name}</h3>
                                        <p className="text-sm text-stone-500 mb-2">{item.subCategory} | {item.color}</p>
                                        <p className="text-sm font-medium">Qty: {item.qty} × ₹{item.price}</p>
                                    </div>
                                    <div className="text-right flex flex-col justify-between h-full">
                                        <p className="font-bold text-lg mb-4">₹{item.price * item.qty}</p>
                                        <button onClick={() => removeFromCart(item.id)} className="text-red-500 hover:text-red-700 text-xs uppercase tracking-widest flex items-center gap-1 justify-end transition-colors">
                                            <Icon name="trash-2" size={14} /> Remove
                                        </button>
                                    </div>
                                </div>
                            ))}
                            
                            <div className="bg-[#FAF9F6] border border-stone-200 p-6 rounded-xl mt-8">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-lg text-stone-600 uppercase tracking-widest">Subtotal:</span>
                                    <span className="text-3xl font-serif font-bold text-stone-900">₹{total}</span>
                                </div>
                                <button onClick={handleCheckout} className="w-full flex items-center justify-center gap-2 bg-stone-900 text-white py-4 rounded-full text-sm font-bold tracking-widest hover:bg-[#C5A059] transition-colors shadow-lg">
                                    <Icon name="lock" size={18} /> PAY SECURELY NOW
                                </button>
                                <p className="text-center text-[10px] text-stone-400 mt-4 uppercase tracking-widest">Secured by Razorpay</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const WishlistPage = ({ wishlist, toggleWishlist, onProductClick, onBack }) => {
            return (
                <div className="min-h-screen pt-32 px-6 max-w-7xl mx-auto pb-24 fade-in">
                    <button onClick={onBack} className="inline-flex items-center text-stone-500 hover:text-stone-900 mb-6">
                        <Icon name="arrow-left" size={20} className="mr-2" /> Continue Shopping
                    </button>
                    
                    <h2 className="font-serif text-4xl mb-8 text-stone-900 text-center border-b border-stone-200 pb-6">Your Wishlist</h2>
                    
                    {wishlist.length === 0 ? (
                        <div className="text-center py-12">
                            <Icon name="heart" size={48} className="mx-auto text-stone-300 mb-4" />
                            <p className="text-stone-500 text-lg">You haven't saved any items yet.</p>
                            <button onClick={onBack} className="mt-6 text-[#C5A059] underline">Discover Styles</button>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                            {wishlist.map(product => (
                                <div key={product.id} onClick={() => onProductClick(product)} className="group bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all cursor-pointer border border-stone-100 relative">
                                    
                                    {/* Remove from Wishlist Button */}
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); toggleWishlist(product); }}
                                        className="absolute top-3 right-3 z-10 p-2 bg-white/90 rounded-full text-red-500 shadow-sm hover:bg-red-50 transition-colors"
                                        title="Remove from Wishlist"
                                    >
                                        <Icon name="trash-2" size={16} />
                                    </button>

                                    <div className="relative aspect-[4/5] overflow-hidden">
                                        <img src={product.image} alt={product.name} className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700" />
                                    </div>
                                    <div className="p-4">
                                        <p className="text-[10px] text-[#C5A059] uppercase tracking-widest font-bold mb-1">{product.subCategory}</p>
                                        <div className="flex justify-between items-start">
                                            <h3 className="font-serif text-lg text-stone-900">{product.name}</h3>
                                            <span className="font-sans font-medium text-sm">₹{product.price}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const AboutPage = ({ setActivePage }) => (
             <div className="min-h-screen pt-32 px-6 pb-24 max-w-5xl mx-auto fade-in">
                
                {/* Hero Section */}
                <div className="text-center mb-20">
                    <h2 className="font-serif text-4xl md:text-5xl mb-6 text-stone-900">Our Story</h2>
                    <div className="w-16 h-0.5 bg-[#C5A059] mx-auto mb-8"></div>
                    <p className="text-stone-600 font-light text-xl md:text-2xl leading-relaxed max-w-3xl mx-auto italic">
                        "Footwear is not just an accessory—it is an expression of soul. Rooted in traditional craftsmanship, reimagined for the modern woman."
                    </p>
                </div>

                {/* The Brand & Founder */}
                <div className="grid md:grid-cols-2 gap-12 items-center mb-24">
                    <div className="order-2 md:order-1">
                        <h3 className="font-serif text-3xl text-stone-900 mb-6">The Soul of ROOH</h3>
                        <p className="text-stone-600 font-light leading-relaxed mb-6 text-lg">
                            ROOH, meaning <span className="font-medium text-stone-800">soul</span>, is a celebration of art, heritage, and comfort. Founded by <strong className="font-medium text-stone-900">Soumya Jatin Chhabria</strong>, the brand was born from a simple vision: women shouldn't have to choose between beauty and comfort.
                        </p>
                        <p className="text-stone-600 font-light leading-relaxed text-lg">
                            By blending age-old embroidery techniques with thoughtful engineering—like extra-padded soles and premium linings—Soumya created luxurious footwear that allows women to walk with ease, confidence, and grace.
                        </p>
                    </div>
                    <div className="order-1 md:order-2 relative aspect-square md:aspect-[4/5] rounded-2xl overflow-hidden shadow-xl">
                         <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?auto=format&fit=crop&q=80&w=800" alt="Craftsmanship" className="w-full h-full object-cover" />
                    </div>
                </div>

                {/* Craftsmanship Highlights */}
                <div className="bg-[#FAF9F6] rounded-3xl p-10 md:p-16 border border-stone-100 text-center mb-20">
                    <h3 className="font-serif text-3xl text-stone-900 mb-12">The ROOH Difference</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div className="flex flex-col items-center">
                            <Icon name="heart" size={32} className="text-[#C5A059] mb-4" />
                            <h4 className="font-serif text-xl mb-2">Double Cushioned</h4>
                            <p className="text-stone-600 font-light text-sm">Extra padded soles designed for effortless, all-day walking.</p>
                        </div>
                        <div className="flex flex-col items-center">
                            <Icon name="star" size={32} className="text-[#C5A059] mb-4" />
                            <h4 className="font-serif text-xl mb-2">Hand-Embroidered</h4>
                            <p className="text-stone-600 font-light text-sm">Meticulously crafted by skilled artisans using premium materials.</p>
                        </div>
                        <div className="flex flex-col items-center">
                            <Icon name="edit-2" size={32} className="text-[#C5A059] mb-4" />
                            <h4 className="font-serif text-xl mb-2">Customizable</h4>
                            <p className="text-stone-600 font-light text-sm">Personalized designs and bespoke details tailored to your vision.</p>
                        </div>
                    </div>
                </div>

                {/* Call to Action */}
                <div className="text-center">
                    <button onClick={() => setActivePage('collection')} className="bg-stone-900 text-[#FAF9F6] px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:bg-[#C5A059] transition-colors shadow-lg">
                        Explore Our Collection
                    </button>
                </div>
            </div>
        );

        // --- GLOBAL FOOTER COMPONENT ---
        const Footer = () => (
            <footer className="bg-[#1C1C1C] text-[#FAF9F6] py-12 px-6 mt-auto border-t border-stone-800">
                <div className="max-w-7xl mx-auto">
                    
                    {/* Top Row: Brand & Socials */}
                    <div className="flex flex-col md:flex-row items-center justify-between gap-6 mb-8">
                        <div className="text-center md:text-left">
                            <h3 className="font-serif text-2xl tracking-widest mb-1">
                                ROOH <span className="text-[#C5A059] text-[10px] align-top">by SS</span>
                            </h3>
                            <p className="text-stone-400 text-xs font-light">Walk the Elegance</p>
                        </div>
                        
                        <div className="flex items-center justify-center gap-4">
                            <a href="https://wa.me/919876543210" target="_blank" className="group flex items-center justify-center w-12 h-12 bg-stone-800 hover:bg-[#25D366]/20 rounded-full transition-colors text-stone-300 hover:text-[#25D366]" title="WhatsApp Support">
                                <Icon name="message-circle" size={20} />
                            </a>
                            <a href="https://instagram.com/roohbyss" target="_blank" className="group flex items-center justify-center w-12 h-12 bg-stone-800 hover:bg-[#E1306C]/20 rounded-full transition-colors text-stone-300 hover:text-[#E1306C]" title="Instagram">
                                <Icon name="instagram" size={20} />
                            </a>
                            <a href="mailto:support@roohbyss.com" className="group flex items-center justify-center w-12 h-12 bg-stone-800 hover:bg-[#C5A059]/20 rounded-full transition-colors text-stone-300 hover:text-[#C5A059]" title="Email Support">
                                <Icon name="mail" size={20} />
                            </a>
                        </div>
                    </div>

                    {/* Bottom Row: Centered Credits */}
                    <div className="border-t border-stone-800 pt-8 text-center">
                        <p className="text-[10px] text-stone-500 tracking-widest font-light uppercase leading-relaxed">
                            Crafted by <span className="text-stone-400 hover:text-[#C5A059] transition-colors cursor-pointer font-medium">ShreeJi Web Studio</span>
                        </p>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
const [currentPage, setCurrentPage] = useState('home');
    const [selectedProduct, setSelectedProduct] = useState(null);
    const [cart, setCart] = useState([]);
    const [wishlist, setWishlist] = useState([]);
    const [toastMessage, setToastMessage] = useState("");
    const [isInitialLoading, setIsInitialLoading] = useState(true);
    const [products, setProducts] = useState([]);
    const [subCategories, setSubCategories] = useState([]);
    const [storeSettings, setStoreSettings] = useState(STORE_SETTINGS);
            
    useEffect(() => {
        // 1. Listen for Products
        const q = window.FB.query(
            window.FB.collection(window.FB.db, "products"), 
            window.FB.orderBy("createdAt", "desc")
        );
        const unsubProducts = window.FB.onSnapshot(q, (snapshot) => {
            const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setProducts(docs);
            setIsInitialLoading(false); // This stops the splash screen when data arrives
        });

        // 2. Listen for Categories
        const unsubCats = window.FB.onSnapshot(window.FB.doc(window.FB.db, "settings", "categories"), (doc) => {
            if (doc.exists()) {
                setSubCategories(doc.data().list);
            }
        });

        return () => { unsubProducts(); unsubCats(); };
    }, []);

            useEffect(() => {
                // Hide splash screen after 2 seconds
                const timer = setTimeout(() => {
                    setIsInitialLoading(false);
                }, 2000);
                
                return () => clearTimeout(timer);
            }, []);
            
            // Scroll to top on page change
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [currentPage, selectedProduct]);

            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => {
                    setToastMessage("");
                }, 3000);
            };

            const handleAddToCart = (product) => {
                const existingItem = cart.find(item => item.id === product.id);
                if (existingItem) {
                    setCart(cart.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item));
                } else {
                    setCart([...cart, { ...product, qty: 1 }]);
                }
                showToast(`${product.name} added to your bag!`);
            };

            const toggleWishlist = (product) => {
                if (wishlist.find(item => item.id === product.id)) {
                    setWishlist(wishlist.filter(item => item.id !== product.id));
                } else {
                    setWishlist([...wishlist, product]);
                }
            };

            const renderPage = () => {
                switch(currentPage) {
            case 'home': return <HomePage setActivePage={setCurrentPage} settings={storeSettings} />;
            case 'collection': return <CollectionPage products={products} subCategories={subCategories} onProductClick={(p) => { setSelectedProduct(p); setCurrentPage('product-details'); }} wishlist={wishlist} toggleWishlist={toggleWishlist} />;
            case 'product-details': return <ProductDetailsPage product={selectedProduct} allProducts={products} onBack={() => setCurrentPage('collection')} onAddToCart={handleAddToCart} wishlist={wishlist} toggleWishlist={toggleWishlist} onProductClick={(p) => { setSelectedProduct(p); setCurrentPage('product-details'); }} />;
                    case 'cart': return <CartPage cart={cart} setCart={setCart} onBack={() => setCurrentPage('collection')} setActivePage={setCurrentPage} showToast={showToast} />;
                    case 'wishlist': return <WishlistPage wishlist={wishlist} toggleWishlist={toggleWishlist} onProductClick={(p) => { setSelectedProduct(p); setCurrentPage('product-details'); }} onBack={() => setCurrentPage('collection')} />;
                    case 'about': return <AboutPage setActivePage={setCurrentPage} />;
                    default: return <HomePage setActivePage={setCurrentPage} settings={STORE_SETTINGS} />;
                }
            };

            // --- RENDER SPLASH SCREEN ---
            if (isInitialLoading) {
                return (
                    <div className="fixed inset-0 bg-[#FAF9F6] flex flex-col items-center justify-center z-[100] fade-in">
                        <div className="text-center animate-pulse">
                            <h1 className="font-serif tracking-widest font-bold text-4xl md:text-5xl text-stone-900 mb-2">ROOH</h1>
                            <span className="text-[10px] md:text-xs tracking-[0.3em] uppercase text-[#C5A059] block">By SS</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col min-h-screen fade-in relative">
                    <Navbar 
                        activePage={currentPage} 
                        setActivePage={setCurrentPage} 
                        cartCount={cart.reduce((sum, item) => sum + item.qty, 0)} 
                        wishlistCount={wishlist.length}
                    />
                    <main className="flex-grow">
                        {renderPage()}
                    </main>
                    <Footer />
                    
                    {/* Toast Notification Element */}
                    {toastMessage && (
                        <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 md:translate-x-0 md:left-auto md:right-8 bg-stone-900 text-white px-6 py-4 rounded-full shadow-2xl z-[100] flex items-center gap-3 toast-enter">
                            <Icon name="check-circle" size={20} className="text-[#C5A059]" />
                            <span className="text-sm font-medium tracking-wide whitespace-nowrap">{toastMessage}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
